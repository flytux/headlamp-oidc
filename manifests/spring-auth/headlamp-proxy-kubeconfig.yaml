apiVersion: v1
kind: Secret
metadata:
  labels:
    idp: spring-auth
  name: headlamp-proxy-kubeconfig
  namespace: headlamp
type: Opaque
stringData:  
  config: |
    apiVersion: v1
    kind: Config
    clusters:
      - cluster:
          certificate-authority-data: 
          server: https://kube-oidc-proxy.headlamp
        name: kube-oidc-proxy
    contexts:
      - context:
          cluster: kube-oidc-proxy
          user: oidc
        name: kube-oidc-proxy
    current-context: kube-oidc-proxy
    users:
      - name: oidc
        user:
          auth-provider:
            name: oidc
            config:
              client-id: headlamp
              client-secret: change-me-with-real-client-secret
              idp-issuer-url: https://spring-auth.node-01
              scope: profile,email,groups
              useAccessToken: "true"
